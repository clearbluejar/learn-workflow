name: index-refresh

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run id that produced the packaged artifact"
        required: true
      artifact_name:
        description: "Artifact name to import"
        required: true
      ghidra_version:
        description: "Pinned Ghidra version to install"
        required: true
        default: "12.0.4"
      config_template:
        description: "BSim config template for database creation"
        required: true
        default: "medium_64"
      allow_existing:
        description: "Import into an existing database if create returns non-zero"
        required: true
        type: boolean
        default: true
      namespace:
        description: "Optional override namespace; leave blank to use BSIM_NAMESPACE_PREFIX secret + artifact name"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      BSIM_DB_URL: ${{ secrets.BSIM_DB_URL }}
      BSIM_NAMESPACE_PREFIX: ${{ secrets.BSIM_NAMESPACE_PREFIX }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install zstandard

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Install pinned Ghidra
        run: |
          set -euo pipefail
          version="${{ inputs.ghidra_version }}"
          tag="Ghidra_${version}_build"
          asset_url="$(VERSION="$version" curl -fsSL -H 'Accept: application/vnd.github+json' -H 'X-GitHub-Api-Version: 2022-11-28' "https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/tags/${tag}" | python3 -c 'import json, os, sys; version=os.environ[\"VERSION\"]; data=json.load(sys.stdin); assets=[a for a in data[\"assets\"] if a[\"name\"].startswith(f\"ghidra_{version}_PUBLIC_\") and a[\"name\"].endswith(\".zip\")]; print(assets[0][\"browser_download_url\"] if assets else \"\", end=\"\")')"
          test -n "$asset_url"
          curl -fsSL "$asset_url" -o "$RUNNER_TEMP/ghidra.zip"
          unzip -q "$RUNNER_TEMP/ghidra.zip" -d "$RUNNER_TEMP/ghidra-install"
          ghidra_dir="$(find "$RUNNER_TEMP/ghidra-install" -maxdepth 1 -mindepth 1 -type d | head -n1)"
          test -n "$ghidra_dir"
          echo "GHIDRA_INSTALL_DIR=$ghidra_dir" >> "$GITHUB_ENV"

      - name: Validate DB settings
        run: |
          test -n "$BSIM_DB_URL"

      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.source_run_id }}
          name: ${{ inputs.artifact_name }}
          path: imported_collection

      - name: Resolve namespace
        id: ns
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.namespace }}" ]; then
            ns="${{ inputs.namespace }}"
          elif [ -n "${BSIM_NAMESPACE_PREFIX}" ]; then
            ns="${BSIM_NAMESPACE_PREFIX}/${{ inputs.artifact_name }}"
          else
            ns=""
          fi
          echo "value=$ns" >> "$GITHUB_OUTPUT"

      - name: Refresh BSim index
        run: |
          set -euo pipefail
          cmd=(
            python3 import_packaged_bsim.py build
            --collection-dir imported_collection
            --ghidra-install-dir "$GHIDRA_INSTALL_DIR"
            --db-url "$BSIM_DB_URL"
            --config-template "${{ inputs.config_template }}"
          )
          if [ "${{ inputs.allow_existing }}" = "true" ]; then
            cmd+=(--allow-existing)
          fi
          if [ -n "${{ steps.ns.outputs.value }}" ]; then
            cmd+=(--override "${{ steps.ns.outputs.value }}")
          fi
          "${cmd[@]}"
