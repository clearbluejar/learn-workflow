name: windows-baseline-bsim-smoke

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "How many binaries to collect from System32/SysWOW64"
        required: true
        default: "2"
      recurse:
        description: "Recurse into subdirectories while collecting"
        required: true
        type: boolean
        default: false
      ghidra_version:
        description: "Pinned Ghidra version to install"
        required: true
        default: "12.0.4"
      ghidra_bsim_compat_version:
        description: "Pinned BSim compatibility version recorded in toolchain.lock"
        required: true
        default: "6.0"
      bsim_template:
        description: "Pinned BSim template recorded in toolchain.lock"
        required: true
        default: "medium_64"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bsim-smoke:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pefile zstandard ghidrecomp
          python -m pip show ghidrecomp

      - name: Install pinned Ghidra
        shell: pwsh
        run: |
          $version = "${{ inputs.ghidra_version }}"
          $tag = "Ghidra_${version}_build"
          $headers = @{
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/tags/$tag"
          $asset = $release.assets | Where-Object { $_.name -like "ghidra_${version}_PUBLIC_*.zip" } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find Ghidra zip asset for version $version"
          }
          $zipPath = Join-Path $env:RUNNER_TEMP $asset.name
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath
          $installRoot = Join-Path $env:RUNNER_TEMP "ghidra-install"
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          Expand-Archive -Path $zipPath -DestinationPath $installRoot -Force
          $ghidraDir = Get-ChildItem $installRoot -Directory | Select-Object -First 1
          if (-not $ghidraDir) {
            throw "Failed to locate extracted Ghidra directory"
          }
          "GHIDRA_INSTALL_DIR=$($ghidraDir.FullName)" >> $env:GITHUB_ENV
          "GHIDRA_VERSION=$version" >> $env:GITHUB_ENV

      - name: Collect bounded baseline subset
        shell: pwsh
        run: |
          if ("${{ inputs.recurse }}" -eq "true") {
            python collect_baseline.py `
              --root C:\Windows\System32 `
              --root C:\Windows\SysWOW64 `
              --out-dir collections_build\baseline_collect `
              --limit ${{ inputs.limit }} `
              --min-size-bytes 65536 `
              --runner-label windows-2022 `
              --source-dataset windows-2022-baseline-bsim-smoke `
              --recurse
          }
          else {
            python collect_baseline.py `
              --root C:\Windows\System32 `
              --root C:\Windows\SysWOW64 `
              --out-dir collections_build\baseline_collect `
              --limit ${{ inputs.limit }} `
              --min-size-bytes 65536 `
              --runner-label windows-2022 `
              --source-dataset windows-2022-baseline-bsim-smoke
          }

      - name: Run ghidrecomp BSim smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ghidrecomps | Out-Null
          Get-ChildItem collections_build\baseline_collect\binaries -File | ForEach-Object {
            ghidrecomp --va --bsim --skip-symbols --thread-count 2 $_.FullName
          }

      - name: Build collection id
        id: vars
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd-HHmmss"
          $collectionId = "windows-2022-bsim-smoke-$date"
          "collection_id=$collectionId" >> $env:GITHUB_OUTPUT

      - name: Package BSim smoke collection
        shell: pwsh
        run: |
          $collectedAt = (Get-Date).ToUniversalTime().ToString("s") + "Z"
          $imageVersion = if ($env:ImageVersion) { $env:ImageVersion } else { "unknown" }
          python package_collection.py `
            --collection-id ${{ steps.vars.outputs.collection_id }} `
            --collection-name "windows-2022 bsim smoke" `
            --mode baseline-image `
            --binaries-dir collections_build\baseline_collect\binaries `
            --bsim-dir ghidrecomps\bsim-xmls `
            --meta-dir collections_build\baseline_collect\meta `
            --out-dir collections_build\out `
            --runner-label windows-2022 `
            --runner-image-version $imageVersion `
            --ghidra-version ${{ inputs.ghidra_version }} `
            --ghidra-bsim-compat-version ${{ inputs.ghidra_bsim_compat_version }} `
            --bsim-template ${{ inputs.bsim_template }} `
            --collected-at $collectedAt `
            --scope C:\Windows\System32 C:\Windows\SysWOW64 `
            --selection-reason "GitHub Actions BSim smoke run"

      - name: Summarize packaged output
        shell: pwsh
        run: |
          Get-ChildItem collections_build\out\${{ steps.vars.outputs.collection_id }} | Select-Object Name,Length | Format-Table -AutoSize

      - name: Upload packaged smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.collection_id }}
          path: collections_build/out/${{ steps.vars.outputs.collection_id }}
          retention-days: 7

      - name: Upload ghidrecomp logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.collection_id }}-raw
          path: |
            ghidrecomps
          retention-days: 7
