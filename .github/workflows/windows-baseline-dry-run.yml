name: windows-baseline-dry-run

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "How many binaries to collect from System32/SysWOW64"
        required: true
        default: "8"
      recurse:
        description: "Recurse into subdirectories"
        required: true
        type: boolean
        default: false
      ghidra_version:
        description: "Pinned Ghidra version recorded in toolchain.lock"
        required: true
        default: "11.2.1"
      ghidra_bsim_compat_version:
        description: "Pinned BSim compatibility version recorded in toolchain.lock"
        required: true
        default: "6.0"
      bsim_template:
        description: "Pinned BSim template recorded in toolchain.lock"
        required: true
        default: "medium_64"

jobs:
  dry-run:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pefile zstandard

      - name: Collect bounded baseline subset
        shell: pwsh
        run: |
          $recurse = if ("${{ inputs.recurse }}" -eq "true") { "--recurse" } else { "" }
          python collect_baseline.py `
            --root C:\Windows\System32 `
            --root C:\Windows\SysWOW64 `
            --out-dir collections_build\baseline_collect `
            --limit ${{ inputs.limit }} `
            --runner-label windows-2022 `
            --source-dataset windows-2022-baseline-dryrun `
            $recurse

      - name: Prepare empty BSim directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path ghidrecomps\bsim-xmls | Out-Null

      - name: Build collection id
        id: vars
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyyMMdd-HHmmss"
          $collectionId = "windows-2022-dryrun-$date"
          "collection_id=$collectionId" >> $env:GITHUB_OUTPUT

      - name: Package dry-run collection
        shell: pwsh
        run: |
          $collectedAt = (Get-Date).ToUniversalTime().ToString("s") + "Z"
          $imageVersion = if ($env:ImageVersion) { $env:ImageVersion } else { "unknown" }
          python package_collection.py `
            --collection-id ${{ steps.vars.outputs.collection_id }} `
            --collection-name "windows-2022 dry run" `
            --mode baseline-image `
            --binaries-dir collections_build\baseline_collect\binaries `
            --bsim-dir ghidrecomps\bsim-xmls `
            --meta-dir collections_build\baseline_collect\meta `
            --out-dir collections_build\out `
            --runner-label windows-2022 `
            --runner-image-version $imageVersion `
            --ghidra-version ${{ inputs.ghidra_version }} `
            --ghidra-bsim-compat-version ${{ inputs.ghidra_bsim_compat_version }} `
            --bsim-template ${{ inputs.bsim_template }} `
            --collected-at $collectedAt `
            --scope C:\Windows\System32 C:\Windows\SysWOW64 `
            --selection-reason "GitHub Actions dry run"

      - name: Summarize output
        shell: pwsh
        run: |
          Get-ChildItem collections_build\out\${{ steps.vars.outputs.collection_id }} | Select-Object Name,Length | Format-Table -AutoSize

      - name: Upload dry-run artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.collection_id }}
          path: collections_build/out/${{ steps.vars.outputs.collection_id }}
          retention-days: 7
