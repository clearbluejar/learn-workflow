name: artifact-check

on:
  pull_request:
  push:
    branches: ["main"]
    paths:
      - "package_collection.py"
      - "import_packaged_bsim.py"
      - ".github/workflows/artifact-check.yml"
      - "tests/**"
      - ".gitignore"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Run packaging and import tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
