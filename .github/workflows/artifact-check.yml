name: artifact-check

on:
  pull_request:
  push:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "src/**"
      - "package_collection.py"
      - "import_packaged_bsim.py"
      - "collect_baseline.py"
      - "bsim_db_tool.py"
      - "gen_files.py"
      - ".github/workflows/artifact-check.yml"
      - "tests/**"
      - ".gitignore"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Install harness package
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .
      - name: Validate console entry points
        run: |
          curation-collect --help
          curation-package --help
          curation-bsim --help
          curation-import-bsim --help
      - name: Run packaging and import tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v
